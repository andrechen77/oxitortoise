<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Oxitortoise Bench Testing Page</title>
</head>

<body>
	<input type="text" id="model_name" placeholder="Model Name">
	<button id="load">Load</button>
	<button id="run_main">
		<pre>main()</pre>
	</button>
	<button id="run_setup">
		<pre>setup()</pre>
	</button>
	<button id="run_go">
		<pre>go()</pre>
	</button>
	<button id="run_perf_trials">
		<pre>perf_trials()</pre>
	</button>

	<script type="module">
		import { instantiateWasm } from './oxitortoise_runner.js';

		var modelName = null;
		var wasmInstance = null;

		async function load() {
			console.log("loading");
			modelName = document.getElementById('model_name').value;
			const modulePath = `models/${modelName}/run.wasm`;
			wasmInstance = await instantiateWasm(modulePath, update => console.log(`module tried to visualize update of length ${update.length}`));
			console.log("loaded");
		}

		function runMain() {
			console.log("running main()");
			wasmInstance.exports["main"]();
		}
		function runSetup() {
			console.log("running setup()");
			wasmInstance.exports["call_setup"]();
		}
		function runGo() {
			console.log("running go()");
			wasmInstance.exports["call_go"]();
		}
		function runPerfTrials() {
			console.time("perf_trials");
			wasmInstance.exports["perf_trials"]();
			console.timeEnd("perf_trials");
			alert("perf trials complete");
		}

		document.addEventListener('DOMContentLoaded', function () {
			document.getElementById('load').addEventListener('click', load);
			document.getElementById('run_main').addEventListener('click', runMain);
			document.getElementById('run_setup').addEventListener('click', runSetup);
			document.getElementById('run_go').addEventListener('click', runGo);
			document.getElementById('run_perf_trials').addEventListener('click', runPerfTrials);
		});
	</script>
</body>

</html>
