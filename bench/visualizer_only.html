<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Oxitortoise Bench Testing Page</title>
</head>

<body>
	<input type="text" id="filename" placeholder="Filename">
	<button id="visualize">Visualize</button>
	<div id="view-container" style="height: 600px; width: 600px;"></div>

	<!-- these are necessary to get `tortoise_require` to work -->
	<script src="tortoise-compiler.js"></script>
	<script src="tortoise-engine.js"></script>

	<script type="module">
		import ViewController from "http://localhost:9000/assets/javascripts/target/coffee-output/main/beak/widgets/draw/view-controller.js";
		import { instantiateWasm } from './oxitortoise_runner.js';

		const viewWidget = {
			fontSize: 11,
			dimensions: {
				// TODO get these from the model... somehow
				maxPxcor: 35,
				maxPycor: 35,
				minPxcor: -35,
				minPycor: -35,
				patchSize: 7,
				wrappingAllowedInX: false,
				wrappingAllowedInY: false,
			},
		};
		const container = document.getElementById('view-container');
		const viewController = new ViewController(container, viewWidget);


		async function visualize() {
			const filenameTemplate = document.getElementById('filename').value;
			let currentTick = 0;
			while (true) {
				const nextFrame = new Promise(resolve => setTimeout(resolve, 30));
				const filename = filenameTemplate.replace("{tick}", currentTick.toString());
				const response = await fetch(filename);
				if (response.status !== 200) break;
				const update = await response.text();
				viewController.update(eval(`(${update})`))
				currentTick++;
				await nextFrame;
			}
		}

		document.addEventListener('DOMContentLoaded', function () {
			document.getElementById('visualize').addEventListener('click', visualize);
		});
	</script>
</body>

</html>
