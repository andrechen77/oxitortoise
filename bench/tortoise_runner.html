<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tortoise Bench Testing Page</title>
</head>

<body>
	<input type="text" id="model_name" placeholder="Model Name">
	<button id="load">Load</button>
	<button id="time_perf_trials">
		perf trials
	</button>

	<script src="http://localhost:9000/netlogo-engine.js"></script>
	<script src="http://localhost:9000/tortoise-compiler.js"></script>

	<script type="module">
		import { compileModel, runPerfTrials } from './tortoise_runner.js';

		var modelName = null;

		async function load() {
			modelName = document.getElementById('model_name').value;
			console.log(`loading model ${modelName}`);
			const modelFilePath = `models/${modelName}/model.nlogox`;
			await compileModel(modelFilePath);
			console.log("loaded");
		}

		function timePerfTrials() {
			console.time("perf_trials");
			runPerfTrials();
			console.timeEnd("perf_trials");
			alert("perf trials complete");
		}

		document.addEventListener('DOMContentLoaded', () => {
			document.getElementById('load').addEventListener('click', load);
			document.getElementById('time_perf_trials').addEventListener('click', timePerfTrials);
		});
	</script>
</body>

</html>
