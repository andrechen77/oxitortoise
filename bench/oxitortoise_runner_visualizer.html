<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Oxitortoise Bench Testing Page</title>
</head>

<body>
	<input type="text" id="model_name" placeholder="Model Name">
	<button id="load">Load</button>
	<button id="run_main">
		<pre>main()</pre>
	</button>
	<button id="run_setup">
		<pre>setup()</pre>
	</button>
	<button id="run_go">
		<pre>go()</pre>
	</button>
	<div id="view-container" style="height: 600px; width: 600px;"></div>

	<!-- these are necessary to get `tortoise_require` to work -->
	<script src="tortoise-compiler.js"></script>
	<script src="tortoise-engine.js"></script>

	<script type="module">
		import ViewController from "http://localhost:9000/assets/javascripts/target/coffee-output/main/beak/widgets/draw/view-controller.js";
		import { instantiateWasm } from './oxitortoise_runner.js';

		const viewWidget = {
			fontSize: 11,
			dimensions: {
				// TODO get these from the model... somehow
				maxPxcor: 35,
				maxPycor: 35,
				minPxcor: -35,
				minPycor: -35,
				patchSize: 7,
				wrappingAllowedInX: false,
				wrappingAllowedInY: false,
			},
		};
		const container = document.getElementById('view-container');
		const viewController = new ViewController(container, viewWidget);

		var modelName = null;
		var wasmInstance = null;

		async function load() {
			console.log("loading");
			modelName = document.getElementById('model_name').value;
			const modulePath = `models/${modelName}/run.wasm`;
			wasmInstance = await instantiateWasm(modulePath, update => {
				console.log("visualizing update of length ", update.length);
				viewController.update(eval(`(${update})`));
			});
			console.log("loaded");
		}

		function runMain() {
			console.log("running main()");
			wasmInstance.exports["main"]();
		}

		function runSetup() {
			console.log("running setup()");
			wasmInstance.exports["call_setup"]();
		}

		function runGo() {
			console.log("running go()");
			wasmInstance.exports["call_go"]();
		}

		document.addEventListener('DOMContentLoaded', function () {
			document.getElementById('load').addEventListener('click', load);
			document.getElementById('run_main').addEventListener('click', runMain);
			document.getElementById('run_setup').addEventListener('click', runSetup);
			document.getElementById('run_go').addEventListener('click', runGo);
		});
	</script>
</body>

</html>
